basePath: /
definitions:
  handlers.DeployCharacterRequest:
    properties:
      h3_zone:
        type: string
    required:
    - h3_zone
    type: object
  handlers.DeployCharacterResponse:
    properties:
      base_damage:
        type: integer
      crit_chance:
        type: number
      crit_multiplier:
        type: number
      damage_amp:
        type: number
      damage_reduction:
        type: number
      h3_index:
        type: string
      h3_zone:
        type: string
      hp:
        type: integer
      id:
        type: string
      max_hp:
        type: integer
      name:
        type: string
    type: object
  handlers.InitPlayerResponse:
    properties:
      name:
        type: string
      playerId:
        type: string
      sessionToken:
        type: string
    type: object
  handlers.ZoneResponse:
    properties:
      h3_zone:
        type: string
      monsters:
        items:
          $ref: '#/definitions/services.ZoneMonsterResponse'
        type: array
    type: object
  services.ZoneMonsterResponse:
    properties:
      current_hp:
        type: integer
      h3_index:
        type: string
      icon:
        type: string
      id:
        type: string
      is_alive:
        type: boolean
      max_hp:
        type: integer
      type:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Idle geo-based monster hunting game API
  title: HexSlayer API
  version: "1.0"
paths:
  /api/character/deploy:
    post:
      consumes:
      - application/json
      description: Deploy a new character with randomized stats to the specified H3
        zone. Max 2 alive characters per player.
      parameters:
      - description: Deploy request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.DeployCharacterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.DeployCharacterResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deploy a character to a zone
      tags:
      - character
  /api/health:
    get:
      description: Returns server status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /api/map/zones:
    get:
      description: Compute zone from coordinate, ensure monsters spawned, return all
        monsters in zone
      parameters:
      - description: Latitude
        in: query
        name: lat
        required: true
        type: number
      - description: Longitude
        in: query
        name: lng
        required: true
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ZoneResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get map zones
      tags:
      - map
  /api/player/init:
    post:
      description: Creates a new player with a session token. No request body needed.
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.InitPlayerResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new player
      tags:
      - player
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
